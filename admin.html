<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A!W Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0066ff;
            --dark: #0f0f1e;
            --darker: #050510;
            --text-primary: #ffffff;
            --text-secondary: #a8aac5;
            --accent: #00d4ff;
            --danger: #ff0066;
            --success: #00cc88;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .login-screen, .dashboard { display: none; }
        .login-screen.active, .dashboard.active { display: block; }
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .login-box {
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 15px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0, 102, 255, 0.05);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 102, 255, 0.1);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 8px;
            color: var(--dark);
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #ff3366);
            color: white;
            margin-top: 1rem;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #00ff99);
            color: var(--dark);
        }

        .btn-secondary {
            background: rgba(0, 102, 255, 0.2);
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(0, 102, 255, 0.2);
            padding-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .dashboard-header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            color: var(--primary);
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: var(--dark);
            border-color: var(--primary);
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .section h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: var(--accent);
        }

        .form-box {
            background: rgba(0, 102, 255, 0.08);
            border: 1px solid rgba(0, 102, 255, 0.2);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .form-box h3 {
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .form-box .btn {
            width: auto;
        }

        .table-responsive {
            overflow-x: auto;
            background: rgba(0, 102, 255, 0.08);
            border: 1px solid rgba(0, 102, 255, 0.2);
            border-radius: 12px;
            margin-top: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(0, 102, 255, 0.1);
        }

        th {
            background: rgba(0, 102, 255, 0.15);
            font-weight: 700;
            color: var(--accent);
        }

        tr:hover {
            background: rgba(0, 102, 255, 0.08);
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            margin: 0 0.25rem;
            cursor: pointer;
            width: auto;
        }

        .delete-btn {
            background: var(--danger);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="login-screen active">
        <div class="login-box">
            <h2>🔐 Admin Dashboard</h2>
            <div class="form-group">
                <label for="password">Enter Admin Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button class="btn" onclick="login()">Login</button>
            <button class="btn btn-secondary" onclick="window.location.href='index.html'" style="margin-top: 1rem;">Back to Website</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="container">
            <div class="dashboard-header">
                <h1>📊 Admin Dashboard</h1>
                <div class="nav-buttons">
                    <button class="nav-tab active" onclick="switchTab('messages')">Messages</button>
                    <button class="nav-tab" onclick="switchTab('services')">Services</button>
                    <button class="nav-tab" onclick="switchTab('portfolio')">Portfolio</button>
                    <button class="btn btn-danger" style="padding: 0.8rem 1.5rem; width: auto;" onclick="logout()">Logout</button>
                </div>
            </div>

            <div id="messages" class="section active">
                <h2>📬 Contact Messages</h2>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">All inquiries from clients will appear here.</p>
                <div id="messagesContainer"></div>
            </div>

            <div id="services" class="section">
                <h2>💼 Manage Services</h2>
                <div class="form-box">
                    <h3>Add New Service</h3>
                    <div class="form-group">
                        <label for="serviceName">Service Name</label>
                        <input type="text" id="serviceName" placeholder="e.g., Custom Web Application">
                    </div>
                    <div class="form-group">
                        <label for="serviceDesc">Description</label>
                        <input type="text" id="serviceDesc" placeholder="Brief description">
                    </div>
                    <div class="form-group">
                        <label for="servicePrice">Price Range (USD)</label>
                        <input type="text" id="servicePrice" placeholder="e.g., $400 - $600">
                    </div>
                    <button class="btn btn-success" onclick="addService()">Add Service</button>
                </div>
                <div id="servicesContainer"></div>
            </div>

            <div id="portfolio" class="section">
                <h2>🎨 Manage Portfolio</h2>
                <div class="form-box">
                    <h3>Add New Project</h3>
                    <div class="form-group">
                        <label for="projectTitle">Project Title</label>
                        <input type="text" id="projectTitle" placeholder="e.g., E-Commerce Platform">
                    </div>
                    <div class="form-group">
                        <label for="projectCategory">Category</label>
                        <input type="text" id="projectCategory" placeholder="e.g., Web Application">
                    </div>
                    <div class="form-group">
                        <label for="projectDesc">Description</label>
                        <input type="text" id="projectDesc" placeholder="Project description">
                    </div>
                    <div class="form-group">
                        <label for="projectLink">Project Link (URL)</label>
                        <input type="url" id="projectLink" placeholder="https://example.com">
                    </div>
                    <button class="btn btn-success" onclick="addProject()">Add Project</button>
                </div>
                <div id="portfolioContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "King$ay!07";

        function login() {
            const password = document.getElementById('password').value;
            if (password === ADMIN_PASSWORD) {
                document.querySelector('.login-screen').classList.remove('active');
                document.querySelector('.dashboard').classList.add('active');
                loadAllData();
                sessionStorage.setItem('adminLoggedIn', 'true');
            } else {
                alert('❌ Invalid password. Please try again.');
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.removeItem('adminLoggedIn');
                location.reload();
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function loadAllData() {
            loadMessages();
            loadServices();
            loadPortfolio();
        }

        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('contacts') || '[]');
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state">No messages yet. When clients submit the contact form, they will appear here.</div>';
                return;
            }

            container.innerHTML = `
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Service</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${messages.map(msg => `
                                <tr>
                                    <td>${msg.name}</td>
                                    <td>${msg.email}</td>
                                    <td>${msg.phone}</td>
                                    <td>${msg.service}</td>
                                    <td>${msg.date}</td>
                                    <td>
                                        <button class="btn btn-small btn-secondary" onclick="viewMessage(${msg.id})">View</button>
                                        <button class="btn btn-small delete-btn" onclick="deleteMessage(${msg.id})">Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function viewMessage(id) {
            const messages = JSON.parse(localStorage.getItem('contacts') || '[]');
            const msg = messages.find(m => m.id === id);
            if (msg) {
                alert(`📧 MESSAGE FROM: ${msg.name}\n\nEmail: ${msg.email}\nPhone: ${msg.phone}\nService: ${msg.service}\n\nMessage:\n${msg.message}`);
            }
        }

        function deleteMessage(id) {
            if (confirm('Delete this message?')) {
                let messages = JSON.parse(localStorage.getItem('contacts') || '[]');
                messages = messages.filter(m => m.id !== id);
                localStorage.setItem('contacts', JSON.stringify(messages));
                loadMessages();
            }
        }

        function addService() {
            const name = document.getElementById('serviceName').value;
            const desc = document.getElementById('serviceDesc').value;
            const price = document.getElementById('servicePrice').value;

            if (!name || !desc || !price) {
                alert('Please fill all fields');
                return;
            }

            let services = JSON.parse(localStorage.getItem('adminServices') || '[]');
            services.push({
                id: Date.now(),
                name: name,
                description: desc,
                price: price
            });

            localStorage.setItem('adminServices', JSON.stringify(services));
            document.getElementById('serviceName').value = '';
            document.getElementById('serviceDesc').value = '';
            document.getElementById('servicePrice').value = '';
            alert('✅ Service added successfully!');
            loadServices();
        }

        function loadServices() {
            const services = JSON.parse(localStorage.getItem('adminServices') || '[]');
            const container = document.getElementById('servicesContainer');

            if (services.length === 0) {
                container.innerHTML = '<div class="empty-state">No custom services added yet.</div>';
                return;
            }

            container.innerHTML = `
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Service Name</th>
                                <th>Description</th>
                                <th>Price</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${services.map(service => `
                                <tr>
                                    <td>${service.name}</td>
                                    <td>${service.description}</td>
                                    <td>${service.price}</td>
                                    <td>
                                        <button class="btn btn-small delete-btn" onclick="deleteService(${service.id})">Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function deleteService(id) {
            if (confirm('Delete this service?')) {
                let services = JSON.parse(localStorage.getItem('adminServices') || '[]');
                services = services.filter(s => s.id !== id);
                localStorage.setItem('adminServices', JSON.stringify(services));
                alert('✅ Service deleted!');
                loadServices();
            }
        }

        function addProject() {
            const title = document.getElementById('projectTitle').value;
            const category = document.getElementById('projectCategory').value;
            const desc = document.getElementById('projectDesc').value;
            const link = document.getElementById('projectLink').value;

            if (!title || !category || !desc || !link) {
                alert('Please fill all fields');
                return;
            }

            let projects = JSON.parse(localStorage.getItem('adminPortfolio') || '[]');
            projects.push({
                id: Date.now(),
                title: title,
                category: category,
                description: desc,
                link: link
            });

            localStorage.setItem('adminPortfolio', JSON.stringify(projects));
            document.getElementById('projectTitle').value = '';
            document.getElementById('projectCategory').value = '';
            document.getElementById('projectDesc').value = '';
            document.getElementById('projectLink').value = '';
            alert('✅ Project added successfully!');
            loadPortfolio();
        }

        function loadPortfolio() {
            const projects = JSON.parse(localStorage.getItem('adminPortfolio') || '[]');
            const container = document.getElementById('portfolioContainer');

            if (projects.length === 0) {
                container.innerHTML = '<div class="empty-state">No custom projects added yet.</div>';
                return;
            }

            container.innerHTML = `
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Link</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${projects.map(project => `
                                <tr>
                                    <td>${project.title}</td>
                                    <td>${project.category}</td>
                                    <td><a href="${project.link}" target="_blank" style="color: var(--primary);">View</a></td>
                                    <td>
                                        <button class="btn btn-small delete-btn" onclick="deleteProject(${project.id})">Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function deleteProject(id) {
            if (confirm('Delete this project?')) {
                let projects = JSON.parse(localStorage.getItem('adminPortfolio') || '[]');
                projects = projects.filter(p => p.id !== id);
                localStorage.setItem('adminPortfolio', JSON.stringify(projects));
                alert('✅ Project deleted!');
                loadPortfolio();
            }
        }

        if (sessionStorage.getItem('adminLoggedIn')) {
            document.querySelector('.login-screen').classList.remove('active');
            document.querySelector('.dashboard').classList.add('active');
            loadAllData();
        }
    </script>
</body>
</html>
